<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>DorkForge Harvester</title>
  <style>
    body {
      width: 380px;
      min-height: 480px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 12px;
      margin: 0;
      padding: 12px;
      background: #0d1117;
      color: #c9d1d9;
    }
    h1 {
      margin: 0 0 8px 0;
      font-size: 14px;
      color: #58a6ff;
      letter-spacing: 0.5px;
    }
    h2 {
      margin: 12px 0 4px 0;
      font-size: 11px;
      text-transform: uppercase;
      color: #8b949e;
      letter-spacing: 0.8px;
      border-bottom: 1px solid #21262d;
      padding-bottom: 2px;
    }
    label {
      display: block;
      margin: 4px 0 2px 0;
      color: #8b949e;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    textarea, input, select {
      width: 100%;
      box-sizing: border-box;
      background: #161b22;
      border: 1px solid #30363d;
      color: #c9d1d9;
      padding: 6px;
      border-radius: 4px;
      font-family: 'JetBrains Mono', 'Courier New', monospace;
      font-size: 11px;
    }
    textarea { min-height: 80px; resize: vertical; }
    button {
      background: #238636;
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
      font-weight: 600;
      margin-right: 4px;
    }
    button:hover { background: #2ea043; }
    button.secondary { background: #21262d; color: #c9d1d9; }
    button.secondary:hover { background: #30363d; }
    button.danger { background: #da3633; }
    button.danger:hover { background: #f85149; }
    .row { display: flex; gap: 4px; margin: 6px 0; }
    .stat {
      display: inline-block;
      margin-right: 12px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
    }
    .stat b { color: #58a6ff; font-weight: 600; }
    .status {
      padding: 6px;
      border-radius: 4px;
      background: #161b22;
      border: 1px solid #30363d;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: #8b949e;
      max-height: 60px;
      overflow-y: auto;
      word-break: break-all;
    }
    .status.running { border-color: #58a6ff; color: #58a6ff; }
    .status.paused { border-color: #d29922; color: #d29922; }
    a { color: #58a6ff; text-decoration: none; }
  </style>
</head>
<body>
  <h1>🔥 DorkForge Harvester</h1>

  <h2>Dorks</h2>
  <label>Paste dorks (one per line)</label>
  <textarea id="dorks" placeholder='inurl:"article.php?id="&#10;inurl:"page.php?cat="&#10;inurl:"news.php?id="'></textarea>

  <label>Engine</label>
  <select id="engine">
    <option value="google">Google (your IP)</option>
    <option value="bing">Bing</option>
    <option value="ddg">DuckDuckGo HTML</option>
    <option value="yahoo">Yahoo</option>
    <option value="startpage">Startpage</option>
  </select>

  <div class="row">
    <button id="startBtn">▶ Start</button>
    <button id="pauseBtn" class="secondary">⏸ Pause</button>
    <button id="resumeBtn" class="secondary">▶ Resume</button>
    <button id="clearBtn" class="danger">🗑 Clear</button>
  </div>

  <h2>Stats</h2>
  <div>
    <span class="stat">URLs: <b id="urlCount">0</b></span>
    <span class="stat">Jobs done: <b id="jobsDone">0</b></span>
    <span class="stat">Status: <b id="runningStatus">idle</b></span>
  </div>
  <div class="status" id="statusBox">Ready. Paste dorks and hit Start.</div>

  <h2>Export</h2>
  <div class="row">
    <button id="exportTxt">📄 sqldumper.txt</button>
    <button id="exportCsv" class="secondary">📊 CSV</button>
    <button id="exportJson" class="secondary">🧬 JSON</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
